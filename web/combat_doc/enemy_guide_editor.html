<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="./enemy_guide.css" />

<body class="editor-page">
  <nav class="site-nav">

    <p id="editor-status" class="editor-status" aria-live="polite"></p>
