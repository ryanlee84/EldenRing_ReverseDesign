# ListUrl/ 정적 파일만 GitHub Pages에 올립니다. 저장소 Settings → Pages → Build: GitHub Actions.
name: Deploy ListUrl to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "ListUrl/**"
      - ".github/workflows/deploy-listurl-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload ListUrl artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ListUrl
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
