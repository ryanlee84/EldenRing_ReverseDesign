<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ListUrl — 보스 문서 목차</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.35rem; }
    ul { padding-left: 1.2rem; }
    li { margin: 0.35rem 0; }
    a { color: #1a5f7a; }
    .err { color: #a30; }
  </style>
</head>
<body>
  <h1>보스 문서 목차</h1>
  <p><code>boss_nav_extra.json</code>과 동일한 순서입니다. 배포 루트에서 바로 열 수 있습니다.</p>
  <ul id="nav"><li class="err">목록 불러오는 중…</li></ul>
  <script>
    (function () {
      var ul = document.getElementById("nav");
      fetch("boss_nav_extra.json", { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error(r.status + " " + r.statusText);
          return r.json();
        })
        .then(function (items) {
          ul.textContent = "";
          items.forEach(function (pair) {
            var href = pair[0];
            var label = pair[1];
            var li = document.createElement("li");
            var a = document.createElement("a");
            a.href = href;
            a.textContent = label;
            li.appendChild(a);
            ul.appendChild(li);
          });
        })
        .catch(function (e) {
          ul.innerHTML = "";
          var li = document.createElement("li");
          li.className = "err";
          li.textContent = "목록을 불러오지 못했습니다: " + e.message;
          ul.appendChild(li);
        });
    })();
  </script>
</body>
</html>
